name: LimesUI testcases

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          cache: true
      - run: pnpm install
      - run: pnpm run check-format
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          cache: true
      - run: pnpm install
      - run: pnpm run lint
  jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          cache: true
      - run: pnpm install
      - run: pnpm run build
      - run: pnpm test
