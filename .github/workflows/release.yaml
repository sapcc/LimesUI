name: Release
on:
    push:
      branches:
        - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # Push commits to the changeset branch
  pull-requests: write # Create/update the release PR

jobs:
  release:
    name: Release
    runs-on: [ubuntu-latest]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.x

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          cache: true

      - name: Install Dependencies
        run: pnpm install

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          # version defaults to: changeset version
          title: "publish: automate Package Versioning with Changesets"
          commit: "chore: update versions with Changesets"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
